# ~/.config/hypr/hypridle.conf
# Daemon de inactividad: auto-lock, apagar pantalla y suspender.
# Sintaxis .conf CLÁSICA (NO es Lua).

general {
    lock_cmd            = pidof hyprlock || hyprlock   # evita lockers duplicados
    before_sleep_cmd    = loginctl lock-session        # LOCK antes de suspender (seguridad)
    after_sleep_cmd     = /home/neftalir/.config/hypr/scripts/wake-monitors.sh   # salvaguarda de la tapa al resumir (ya NO usa dpms)
    ignore_dbus_inhibit = false                        # respeta inhibidores (ej. video a pantalla completa)
    ignore_systemd_inhibit = false
}

# 5 min: baja el brillo como aviso previo
listener {
    timeout   = 300
    on-timeout = brightnessctl -s set 10%   # -s guarda el nivel actual
    on-resume  = brightnessctl -r           # -r lo restaura
}

# 6 min: bloquea la sesión (pasa por lock_cmd -> hyprlock)
listener {
    timeout   = 360
    on-timeout = loginctl lock-session
}

# NOTA: aqui habia un listener de DPMS off a los 8 min. Se ELIMINO: el dispatch
# DPMS (hl.dsp.dpms) tumba waybar y rompe la sesion en este equipo. El apagado de
# pantalla por inactividad queda deshabilitado a proposito; se confia en lock + suspend.

# 15 min: suspende a RAM (tu sistema usa suspend-to-RAM, sin hibernación)
listener {
    timeout   = 900
    on-timeout = systemctl suspend
}
