# ~/.config/hypr/hyprlock.conf
# Locker con blur estilo Hyprland.
# OJO: hyprlock usa la sintaxis .conf CLÁSICA (bloques nombre { }).
# Esto NO es Lua — solo el compositor (hyprland.lua) usa la API hl.*

general {
    hide_cursor        = true
    ignore_empty_input = true   # ignora Enter en vacío
    grace              = 0      # 0 = sin periodo de gracia: pide contraseña de inmediato (seguridad)
    no_fade_in         = false
}

# Fondo: toma lo que hay en pantalla y lo difumina (el "blur de Hyprland")
background {
    monitor          =
    path             = screenshot
    blur_passes      = 3
    blur_size        = 7
    noise            = 0.0117
    contrast         = 0.8916
    brightness       = 0.8172
    vibrancy         = 0.1696
    vibrancy_darkness = 0.0
}

# Hora
label {
    monitor     =
    text        = cmd[update:1000] echo "$(date +'%H:%M:%S')"
    font_size   = 64
    font_family = Noto Sans
    color       = rgba(216, 222, 233, 0.95)
    position    = 0, 160
    halign      = center
    valign      = center
}

# Fecha (día y mes en tu locale es_MX)
label {
    monitor     =
    text        = cmd[update:60000] echo "$(date +'%A, %d %B')"
    font_size   = 20
    font_family = Noto Sans
    color       = rgba(216, 222, 233, 0.70)
    position    = 0, 90
    halign      = center
    valign      = center
}

# Usuario (el glyph  lo aporta ttf-nerd-fonts-symbols)
label {
    monitor     =
    text        =   $USER
    font_size   = 16
    font_family = Noto Sans
    color       = rgba(216, 222, 233, 0.70)
    position    = 0, 50
    halign      = center
    valign      = center
}

# Campo de contraseña
input-field {
    monitor          =
    size             = 250, 50
    outline_thickness = 2
    dots_size        = 0.25
    dots_spacing     = 0.3
    dots_center      = true
    outer_color      = rgba(76, 86, 106, 1.0)
    inner_color      = rgba(46, 52, 64, 0.85)
    font_color       = rgba(216, 222, 233, 1.0)
    fade_on_empty    = false
    placeholder_text = <i>Contraseña...</i>
    hide_input       = false
    check_color      = rgba(163, 190, 140, 1.0)   # verde: verificando
    fail_color       = rgba(191, 97, 106, 1.0)    # rojo: incorrecta
    fail_text        = <i>Incorrecta ($ATTEMPTS)</i>
    capslock_color   = rgba(235, 203, 139, 1.0)   # avisa CapsLock activo
    position         = 0, -20
    halign           = center
    valign           = center
}
